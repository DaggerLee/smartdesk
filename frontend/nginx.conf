server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Vue Router history mode: fall back to index.html for unknown paths
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy all /api requests to the backend service
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # SSE (Server-Sent Events) requires buffering to be off,
        # otherwise nginx holds chunks and streaming appears frozen
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_http_version 1.1;
        chunked_transfer_encoding on;
    }
}
